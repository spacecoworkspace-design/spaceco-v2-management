<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", surface: "#fbf9f8", "surface-container": "#efeded",
          "on-surface-variant": "#444748", primary: "#000000", secondary: "#775a19",
          "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: { "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "label-mono": ["JetBrains Mono"] },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>

  body { font-family: 'Hanken Grotesk', sans-serif; }
  .bracket-tl { border-top: 2px solid #000; border-left: 2px solid #000; }

  .bracket-bl { border-bottom: 2px solid #000; border-left: 2px solid #000; }
  .bracket-br { border-bottom: 2px solid #000; border-right: 2px solid #000; }

<body class="bg-background text-on-surface-variant font-body-md min-h-screen">

<header class="flex justify-between items-center px-margin-mobile h-16 w-full bg-surface border-b border-outline-variant sticky top-0 z-40">
  <div class="flex items-center gap-8">
    <span class="font-headline-md text-primary tracking-tighter">SPACECO — CHECK-IN</span>
    <a href="claims.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Claim Requests</a>
    <a href="expenses.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Expenses</a>
    <a href="shift-payments.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Shift Payments</a>
    <a href="top-performers.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Top Performers</a>
    <a href="shared-space-packages.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Packages</a>
    <a href="recycle-bin.html" class="text-lg text-on-surface-variant hover:text-primary" title="Recycle Bin" aria-label="Recycle Bin">🗑️</a>
  </div>
  <div class="flex items-center gap-4">
    <span id="staff-name" class="font-label-mono text-label-mono uppercase"></span>
    <button id="signout-btn" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Sign Out</button>
  </div>
</header>

<div id="loading-state" class="max-w-4xl mx-auto p-margin-mobile lg:p-12 animate-pulse">
  <div class="h-3 w-32 bg-surface-container mb-3"></div>
  <div class="h-9 w-72 bg-surface-container mb-10"></div>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
  </div>
  <div class="space-y-3">
    <div class="h-12 bg-surface-container"></div>
    <div class="h-12 bg-surface-container"></div>
    <div class="h-12 bg-surface-container"></div>
  </div>
</div>

<main class="hidden max-w-4xl mx-auto p-margin-mobile lg:p-12" id="main-content">
  <section class="mb-12">
    <div class="flex items-center gap-3 mb-4">
      <span class="w-2.5 h-2.5 rounded-full bg-secondary"></span>
      <h2 class="font-headline-md text-primary">Active Sessions</h2>
    </div>
    <p id="active-sessions-empty" class="hidden font-label-mono text-label-mono uppercase text-on-surface-variant py-6">No guests currently inside.</p>
    <div id="active-sessions-list" class="space-y-3"></div>
  </section>

  <div class="mb-stack-lg flex flex-col lg:flex-row lg:items-end justify-between gap-6">
    <div>
      <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Reception</span>
      <h1 class="font-display-lg text-primary">New Session</h1>
    </div>
    <div class="flex flex-col items-end gap-2">
      <div class="inline-flex p-1 bg-surface-container border border-outline-variant">
        <button class="px-6 py-2 bg-primary text-white font-label-mono text-label-mono uppercase transition-all" id="lookupModeBtn">Client Lookup</button>
        <button class="px-6 py-2 text-on-surface-variant font-label-mono text-label-mono uppercase hover:bg-surface-container" id="manualModeBtn">Manual Guest</button>
      </div>
      <div class="flex gap-4">
        <button id="trial-client-btn" class="font-label-mono text-[11px] uppercase text-on-surface-variant hover:text-primary underline">🧪 Trial Client</button>
        <button id="clear-trial-btn" class="font-label-mono text-[11px] uppercase text-on-surface-variant hover:text-primary underline">🧹 Clear Trial</button>
      </div>
    </div>
  </div>

  <p id="trial-notice" class="hidden text-secondary font-label-mono text-[11px] uppercase mb-4"></p>

  <!-- LOOKUP MODE -->
  <section id="lookupView" class="relative mb-10">
    <div class="absolute -top-4 -left-4 w-8 h-8 bracket-tl"></div>
    <div class="absolute -top-4 -right-4 w-8 h-8 bracket-tr"></div>
    <div class="absolute -bottom-4 -left-4 w-8 h-8 bracket-bl"></div>
    <div class="absolute -bottom-4 -right-4 w-8 h-8 bracket-br"></div>
    <div class="bg-surface border border-outline-variant p-8">
      <div class="relative mb-4">
        <input class="w-full bg-surface-container border-b-2 border-primary py-4 px-3 focus:ring-0 focus:outline-none font-label-mono text-body-lg uppercase placeholder:text-outline-variant" id="lookup-input" placeholder="CLIENT ID / NAME / PHONE" type="text"/>
      </div>
      <div id="lookup-results"></div>
      <div id="verified-badge" class="hidden mt-4 p-4 bg-secondary-container text-on-secondary-container flex items-center justify-between">
        <span class="font-label-mono text-label-mono uppercase font-bold" id="verified-text"></span>
        <button id="clear-selection-btn" class="font-label-mono text-[11px] uppercase underline">Change</button>
      </div>
      <div id="package-badge" class="hidden mt-4 p-4 bg-surface-container">
        <span class="font-label-mono text-label-mono uppercase font-bold" id="package-text"></span>
      </div>
    </div>
  </section>

  <!-- MANUAL GUEST MODE -->
  <section id="manualView" class="hidden mb-10 grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="space-y-2">
      <label class="font-label-mono text-label-mono uppercase" for="guest-name">Full Name</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-name" type="text"/>
    </div>
    <div class="space-y-2">
      <label class="font-label-mono text-label-mono uppercase" for="guest-phone">Phone Number</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-phone" type="tel"/>
    </div>
    <div class="space-y-2">
      <label class="font-label-mono text-label-mono uppercase" for="guest-email">Email (optional)</label>
      <input class="w-full border-b border-outline-variant focus:border-primary bg-transparent py-3 focus:ring-0 focus:outline-none font-body-lg" id="guest-email" type="email"/>
    </div>
  </section>

  <!-- ROOM SELECTION -->
  <section class="mb-10">
    <h2 class="font-headline-md mb-6">Select Room</h2>
    <div id="room-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
  </section>

  <p id="form-error" class="text-error mb-4 hidden"></p>
  <p id="form-success" class="text-secondary mb-4 hidden font-label-mono uppercase"></p>

  <button id="start-session-btn" class="w-full bg-secondary text-white py-6 font-headline-md font-bold uppercase tracking-widest hover:opacity-90 active:scale-[0.99] transition-all">
    Start Session
  </button>
</main>

<!-- CHECKOUT MODAL -->

  <div class="bg-background max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 relative">
    <button id="checkout-close-btn" class="absolute top-4 right-4 text-2xl leading-none">✕</button>
    <h2 class="font-headline-md text-primary mb-1">🏁 Guest Checkout</h2>
    <p class="font-label-mono text-label-mono text-on-surface-variant mb-6" id="checkout-guest-info"></p>

    <p class="font-label-mono text-[11px] uppercase text-on-surface-variant mb-2">Add Drinks &amp; Snacks to Tab</p>
    <div id="checkout-drink-menu" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-2"></div>
    <div id="checkout-snack-menu" class="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-4"></div>
    <div id="checkout-order-items" class="mb-6"></div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
      <div>
        <label class="font-label-mono text-label-mono uppercase block mb-1">Time Out</label>
        <input id="checkout-time-out" type="time" class="w-full bg-surface-container border-b-2 border-primary py-2 px-2 focus:ring-0 focus:outline-none"/>
      </div>
      <div>
        <label class="font-label-mono text-label-mono uppercase block mb-1">Discount (LE)</label>
        <input id="checkout-discount" type="number" min="0" step="0.01" value="0" class="w-full bg-surface-container border-b-2 border-primary py-2 px-2 focus:ring-0 focus:outline-none"/>
      </div>
      <div>
        <label class="font-label-mono text-label-mono uppercase block mb-1">Payment Method</label>
        <select id="checkout-payment" class="w-full bg-surface-container border-b-2 border-primary py-2 px-2 focus:ring-0 focus:outline-none">
          <option value="cash">Cash</option>
          <option value="instapay">Instapay</option>
        </select>
      </div>
    </div>

    <div class="bg-surface-container p-4 mb-4">
      <p class="font-label-mono text-[11px] uppercase text-on-surface-variant mb-2">Receipt</p>
      <div class="flex justify-between font-body-lg"><span>Room Cost</span><span id="checkout-room-cost">0 LE</span></div>
      <div class="flex justify-between font-body-lg"><span>Drinks &amp; Snacks</span><span id="checkout-drinks-cost">0 LE</span></div>
      <div class="flex justify-between font-headline-md text-primary mt-2 pt-2 border-t border-outline-variant"><span>Grand Total</span><span id="checkout-grand-total">0 LE</span></div>
    </div>

    <div class="mb-6">
      <label class="font-label-mono text-label-mono uppercase block mb-1">How was the visit? (optional)</label>
      <div id="checkout-rating" class="flex gap-1 text-2xl"></div>
    </div>

    <p id="checkout-error" class="text-error hidden mb-4"></p>
    <button id="checkout-confirm-btn" class="w-full bg-secondary text-white py-4 font-headline-md font-bold uppercase tracking-widest hover:opacity-90">Confirm Checkout &amp; Save</button>
  </div>
</div>

<div id="error-state" class="hidden py-24 text-center">
  <p class="text-error" id="error-text"></p>
  <a href="sign-in.html" class="font-label-mono text-label-mono text-primary uppercase underline mt-4 inline-block">Sign In</a>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/staff-auth.js"></script>
<script src="js/check-in.js"></script>
<script src="js/shared-space-packages.js"></script>
<script src="js/shift-payments.js"></script>
<script>
  const supabaseClient = window.getSpacecoClient();
  let selectedClient = null;
  let selectedRoom = null;
  let currentStaff = null;
  let selectedPackage = null;

  // Shows whether the selected client has a usable Shared Space package -- only relevant once
  // both a verified client and the Shared Space room are picked. Purely informational until
  // Start Session is pressed, which is when the day actually gets consumed.
  async function updatePackageStatus() {
    const badge = document.getElementById("package-badge");
    selectedPackage = null;
    if (!selectedClient || selectedRoom !== "sharedspace") {
      badge.classList.add("hidden");
      return;
    }
    const result = await getActivePackageForClient(supabaseClient, selectedClient.id);
    if (result.error || !result.package) {
      badge.classList.add("hidden");
      return;
    }
    selectedPackage = result.package;
    const remaining = selectedPackage.days_included == null
      ? "Unlimited"
      : `${selectedPackage.days_included - selectedPackage.days_used} of ${selectedPackage.days_included} check-ins left`;
    document.getElementById("package-text").textContent = `☕ Active Shared Space Package — ${remaining}`;
    badge.classList.remove("hidden");
  }

  function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function setMode(mode) {
    document.getElementById("lookupView").classList.toggle("hidden", mode !== "lookup");
    document.getElementById("manualView").classList.toggle("hidden", mode !== "manual");
    document.getElementById("lookupModeBtn").classList.toggle("bg-primary", mode === "lookup");
    document.getElementById("lookupModeBtn").classList.toggle("text-white", mode === "lookup");
    document.getElementById("manualModeBtn").classList.toggle("bg-primary", mode === "manual");
    document.getElementById("manualModeBtn").classList.toggle("text-white", mode === "manual");
    if (mode === "manual") {
      selectedClient = null;
      updatePackageStatus();
    }
  }

  document.getElementById("lookupModeBtn").addEventListener("click", () => setMode("lookup"));
  document.getElementById("manualModeBtn").addEventListener("click", () => setMode("manual"));

  document.getElementById("trial-client-btn").addEventListener("click", () => {
    setMode("manual");
    document.getElementById("guest-name").value = TRIAL_GUEST_NAME;
    document.getElementById("guest-phone").value = TRIAL_GUEST_PHONE;
    const notice = document.getElementById("trial-notice");
    notice.textContent = "🧪 Trial client filled in — pick a room and check in to test!";
    notice.classList.remove("hidden");
  });

  document.getElementById("clear-trial-btn").addEventListener("click", async () => {
    const notice = document.getElementById("trial-notice");
    notice.textContent = "Clearing trial data...";
    notice.classList.remove("hidden");
    const result = await clearTrialCheckIns(supabaseClient);
    notice.textContent = result.error
      ? "Failed to clear trial data: " + result.error
      : `🧹 Cleared ${result.cleared} trial check-in(s).`;
  });

  function renderRoomGrid() {
    const grid = document.getElementById("room-grid");
    grid.innerHTML = "";
    ROOMS.forEach(r => {
      const card = el("div", "cursor-pointer border border-outline-variant p-6 hover:border-primary transition-all bg-surface");
      card.appendChild(el("h4", "font-body-lg font-bold", r.label));
      const pricing = ROOM_PRICING[r.key];
      if (pricing) card.appendChild(el("p", "font-label-mono text-[11px] text-on-surface-variant mt-1", pricing.label));
      card.dataset.roomKey = r.key;
      card.addEventListener("click", () => {
        document.querySelectorAll("#room-grid > div").forEach(c => c.classList.remove("border-primary", "bg-secondary-container"));
        card.classList.add("border-primary", "bg-secondary-container");
        selectedRoom = r.key;
        updatePackageStatus();
      });
      grid.appendChild(card);
    });
  }

  let lookupTimer = null;
  document.getElementById("lookup-input").addEventListener("input", (e) => {
    clearTimeout(lookupTimer);
    const q = e.target.value;
    lookupTimer = setTimeout(async () => {
      const resultsEl = document.getElementById("lookup-results");
      resultsEl.innerHTML = "";
      if (!q.trim()) return;
      const results = await lookupClient(supabaseClient, q);
      results.forEach(c => {
        const row = el("div", "flex items-center justify-between py-3 border-b border-outline-variant cursor-pointer hover:bg-surface-container px-2");
        const left = el("div");
        left.appendChild(el("p", "font-body-lg font-bold", c.name));
        left.appendChild(el("p", "font-label-mono text-[11px] text-on-surface-variant", `#${c.id} — ${c.phone || "no phone"}`));
        row.appendChild(left);
        row.addEventListener("click", () => selectClient(c));
        resultsEl.appendChild(row);
      });
    }, 250);
  });

  function selectClient(c) {
    selectedClient = c;
    document.getElementById("lookup-input").value = "";
    document.getElementById("lookup-results").innerHTML = "";
    document.getElementById("verified-text").textContent = `✅ Verified Client — ${c.name}, #${c.id}`;
    document.getElementById("verified-badge").classList.remove("hidden");
    updatePackageStatus();
  }

  document.getElementById("clear-selection-btn").addEventListener("click", () => {
    selectedClient = null;
    document.getElementById("verified-badge").classList.add("hidden");
    updatePackageStatus();
  });

  document.getElementById("start-session-btn").addEventListener("click", async () => {
    const errEl = document.getElementById("form-error");
    const okEl = document.getElementById("form-success");
    errEl.classList.add("hidden");
    okEl.classList.add("hidden");

    if (!selectedRoom) {
      errEl.textContent = "Select a room first.";
      errEl.classList.remove("hidden");
      return;
    }

    const isManualMode = !document.getElementById("manualView").classList.contains("hidden");
    let payload = { room: selectedRoom, cashier: currentStaff };

    if (isManualMode) {
      const name = document.getElementById("guest-name").value.trim();
      const phone = document.getElementById("guest-phone").value.trim();
      if (!name || !phone) {
        errEl.textContent = "Guest name and phone are required.";
        errEl.classList.remove("hidden");
        return;
      }
      payload.guestName = name;
      payload.guestPhone = phone;
      payload.guestEmail = document.getElementById("guest-email").value.trim();
    } else {
      if (!selectedClient) {
        errEl.textContent = "Look up and select a client, or switch to Manual Guest.";
        errEl.classList.remove("hidden");
        return;
      }
      payload.clientId = selectedClient.id;
    }

    const result = await submitCheckIn(supabaseClient, payload);
    if (result.error) {
      errEl.textContent = result.error;
      errEl.classList.remove("hidden");
      return;
    }

    let successText = `Checked in — session #${result.checkInId}`;
    if (selectedPackage) {
      const consumeResult = await consumePackageDay(supabaseClient, selectedPackage);
      if (!consumeResult.error) successText += " — 1 Shared Space package day used";
    }

    okEl.textContent = successText;
    okEl.classList.remove("hidden");
    selectedClient = null;
    selectedRoom = null;
    selectedPackage = null;
    document.getElementById("verified-badge").classList.add("hidden");
    document.getElementById("package-badge").classList.add("hidden");
    document.getElementById("guest-name").value = "";
    document.getElementById("guest-phone").value = "";
    document.getElementById("guest-email").value = "";
    document.querySelectorAll("#room-grid > div").forEach(c => c.classList.remove("border-primary", "bg-secondary-container"));
    await loadActiveSessions();
  });

  document.getElementById("signout-btn").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "sign-in.html";
  });

  // ============================================================
  // ACTIVE SESSIONS + CHECKOUT
  // ============================================================
  let activeSessions = [];
  let checkoutOrderItems = [];
  let checkoutSession = null;
  let checkoutRating = 0;

  function formatElapsed(ms) {
    const totalSeconds = Math.max(0, Math.floor(ms / 1000));
    const h = Math.floor(totalSeconds / 3600);
    const m = Math.floor((totalSeconds % 3600) / 60);
    const s = totalSeconds % 60;
    return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
  }

  async function loadActiveSessions() {
    const result = await fetchActiveSessions(supabaseClient);
    activeSessions = result.sessions || [];
    renderActiveSessions();
  }

  function renderActiveSessions() {
    const list = document.getElementById("active-sessions-list");
    list.innerHTML = "";
    document.getElementById("active-sessions-empty").classList.toggle("hidden", activeSessions.length > 0);
    activeSessions.forEach(s => {
      const card = el("div", "flex items-center justify-between bg-surface border border-outline-variant p-4 flex-wrap gap-3");
      const left = el("div");
      left.appendChild(el("p", "font-body-lg font-bold", s.displayName + (s.is_guest ? " (Guest)" : "")));
      left.appendChild(el("p", "font-label-mono text-[11px] text-on-surface-variant", `${s.room} · In: ${s.time_in.slice(0, 5)}`));
      card.appendChild(left);

      const right = el("div", "flex items-center gap-4");
      const timer = el("span", "font-label-mono text-headline-md text-primary", "00:00:00");
      timer.dataset.startedAt = s.startedAt.toISOString();
      right.appendChild(timer);
      const checkoutBtn = el("button", "bg-secondary text-white py-2 px-4 font-label-mono text-[11px] uppercase hover:opacity-90", "🏁 Checkout");
      checkoutBtn.addEventListener("click", () => openCheckoutModal(s));
      right.appendChild(checkoutBtn);
      card.appendChild(right);
      list.appendChild(card);
    });
  }

  setInterval(() => {
    document.querySelectorAll("#active-sessions-list [data-started-at]").forEach(node => {
      const started = new Date(node.dataset.startedAt);
      node.textContent = formatElapsed(Date.now() - started);
    });
  }, 1000);

  function menuButton(item) {
    const btn = el("button", "border border-outline-variant py-2 px-3 text-left hover:border-primary text-sm");
    btn.innerHTML = `<span class="block">${item.name}</span><span class="block font-label-mono text-[11px] text-on-surface-variant">${item.price} LE</span>`;
    btn.addEventListener("click", () => {
      checkoutOrderItems.push({ name: item.name, price: item.price, qty: 1 });
      renderCheckoutOrderItems();
      updateReceiptTotals();
    });
    return btn;
  }

  function renderCheckoutMenu() {
    const drinkContainer = document.getElementById("checkout-drink-menu");
    const snackContainer = document.getElementById("checkout-snack-menu");
    drinkContainer.innerHTML = "";
    snackContainer.innerHTML = "";
    DRINK_MENU.forEach(item => drinkContainer.appendChild(menuButton(item)));
    SNACK_MENU.forEach(item => snackContainer.appendChild(menuButton(item)));
  }

  function renderCheckoutOrderItems() {
    const container = document.getElementById("checkout-order-items");
    container.innerHTML = "";
    checkoutOrderItems.forEach((item, idx) => {
      const row = el("div", "flex items-center justify-between py-1 font-label-mono text-label-mono");
      row.innerHTML = `<span>${item.qty}x ${item.name} — ${item.price * item.qty} LE</span>`;
      const removeBtn = el("button", "text-error uppercase text-[11px] hover:underline", "Remove");
      removeBtn.addEventListener("click", () => {
        checkoutOrderItems.splice(idx, 1);
        renderCheckoutOrderItems();
        updateReceiptTotals();
      });
      row.appendChild(removeBtn);
      container.appendChild(row);
    });
  }

  function updateReceiptTotals() {
    if (!checkoutSession) return;
    const timeOut = document.getElementById("checkout-time-out").value;
    const discount = Number(document.getElementById("checkout-discount").value) || 0;
    const endDate = combineDateTime(todayLocal(), timeOut);
    const hours = hoursBetween(checkoutSession.startedAt, endDate);
    const roomCost = Math.max(0, calculateRoomCost(checkoutSession.room_key, hours) - discount);
    const drinksTotal = checkoutOrderItems.reduce((sum, i) => sum + i.price * i.qty, 0);
    document.getElementById("checkout-room-cost").textContent = roomCost + " LE";
    document.getElementById("checkout-drinks-cost").textContent = drinksTotal + " LE";
    document.getElementById("checkout-grand-total").textContent = (roomCost + drinksTotal) + " LE";
  }

  function renderCheckoutRating() {
    const container = document.getElementById("checkout-rating");
    container.innerHTML = "";
    for (let i = 1; i <= 5; i++) {
      const star = el("button", "hover:scale-110 transition-transform", checkoutRating >= i ? "★" : "☆");
      star.type = "button";
      star.addEventListener("click", () => { checkoutRating = i; renderCheckoutRating(); });
      container.appendChild(star);
    }
  }

  function openCheckoutModal(session) {
    checkoutSession = session;
    checkoutOrderItems = [];
    checkoutRating = 0;
    document.getElementById("checkout-guest-info").textContent =
      `${session.displayName} · ${session.room} · In: ${session.time_in.slice(0, 5)} · Cashier: ${session.cashier_name || "-"}`;
    document.getElementById("checkout-time-out").value = nowLocal();
    document.getElementById("checkout-discount").value = 0;
    document.getElementById("checkout-payment").value = "cash";
    document.getElementById("checkout-error").classList.add("hidden");
    renderCheckoutMenu();
    renderCheckoutOrderItems();
    renderCheckoutRating();
    updateReceiptTotals();
    document.getElementById("checkout-modal").classList.remove("hidden");
  }

  document.getElementById("checkout-close-btn").addEventListener("click", () => {
    document.getElementById("checkout-modal").classList.add("hidden");
  });
  document.getElementById("checkout-time-out").addEventListener("change", updateReceiptTotals);
  document.getElementById("checkout-discount").addEventListener("input", updateReceiptTotals);

  document.getElementById("checkout-confirm-btn").addEventListener("click", async () => {
    const errEl = document.getElementById("checkout-error");
    errEl.classList.add("hidden");
    const btn = document.getElementById("checkout-confirm-btn");
    btn.disabled = true;

    const result = await submitCheckout(supabaseClient, {
      checkInId: checkoutSession.id,
      timeOut: document.getElementById("checkout-time-out").value,
      cashier: currentStaff,
      discount: document.getElementById("checkout-discount").value,
      paymentMethod: document.getElementById("checkout-payment").value,
      items: checkoutOrderItems,
      rating: checkoutRating || null,
      feedback: null,
      startedAt: checkoutSession.startedAt,
      roomKey: checkoutSession.room_key,
    });

    btn.disabled = false;
    if (result.error) {
      errEl.textContent = result.error;
      errEl.classList.remove("hidden");
      return;
    }

    document.getElementById("checkout-modal").classList.add("hidden");
    await loadActiveSessions();
  });

  // Never hang silently on this screen: race the session guard against a timeout. If startup
  // is unexpectedly slow or stuck for any reason, show a retry option instead of leaving staff
  // staring at "Checking session..." forever.
  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms)),
    ]);
  }

  async function startCheckInPage() {
    try {
      const guard = await withTimeout(requireStaffSession(supabaseClient), 8000);
      if (guard.redirect) {
        window.location.href = "sign-in.html";
        return;
      }
      currentStaff = guard.staff;
      document.getElementById("staff-name").textContent = guard.staff.name;
      renderRoomGrid();
      document.getElementById("loading-state").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
      await loadActiveSessions();
    } catch (e) {
      document.getElementById("loading-state").innerHTML = "";
      const msg = document.createElement("p");
      msg.className = "mb-4";
      msg.textContent = "Taking longer than expected to load your session.";
      const retryBtn = document.createElement("button");
      retryBtn.className = "font-label-mono text-label-mono text-primary uppercase underline";
      retryBtn.textContent = "Retry";
      retryBtn.addEventListener("click", () => window.location.reload());
      document.getElementById("loading-state").appendChild(msg);
      document.getElementById("loading-state").appendChild(retryBtn);
    }
  }

  startCheckInPage();
</script>
</body>
</html>
