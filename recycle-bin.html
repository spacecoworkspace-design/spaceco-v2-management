<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mhoustvvwmwfovocwwna.supabase.co;"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>SPACECO | Recycle Bin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script src="js/vendor/supabase-js.umd.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", surface: "#fbf9f8", "surface-container": "#efeded",
          "on-surface-variant": "#444748", primary: "#000000", secondary: "#775a19",
          "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: { "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "label-mono": ["JetBrains Mono"] },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>
<style>
  body { font-family: 'Hanken Grotesk', sans-serif; }
</style>
</head>
<body class="bg-background text-on-surface-variant font-body-md min-h-screen">

<header class="flex flex-wrap justify-between items-center px-margin-mobile h-16 w-full bg-surface border-b border-outline-variant sticky top-0 z-40 gap-4">
  <div class="flex items-center gap-8">
    <span class="font-headline-md text-primary tracking-tighter">SPACECO — RECYCLE BIN</span>
    <a href="check-in.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Check-In</a>
    <a href="claims.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Claim Requests</a>
    <a href="expenses.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Expenses</a>
    <a href="shift-payments.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Shift Payments</a>
    <a href="top-performers.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Top Performers</a>
    <a href="shared-space-packages.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Packages</a>
  </div>
  <div class="flex items-center gap-4">
    <span id="staff-name" class="font-label-mono text-label-mono uppercase"></span>
    <button id="signout-btn" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Sign Out</button>
  </div>
</header>

<div id="loading-state" class="py-24 text-center font-label-mono text-label-mono uppercase">Checking session...</div>

<main class="hidden max-w-4xl mx-auto p-margin-mobile lg:p-12" id="main-content">
  <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Deleted items are kept here for 30 days</span>
  <h1 class="font-display-lg text-primary mb-stack-lg">Recycle Bin</h1>

  <div class="flex items-center gap-4 mb-stack-lg">
    <label class="font-label-mono text-label-mono uppercase" for="type-filter">Filter</label>
    <select id="type-filter" class="bg-surface-container border-b-2 border-primary py-2 px-2 focus:ring-0 focus:outline-none">
      <option value="all">All Types</option>
      <option value="clients">Clients</option>
      <option value="check_ins">Visits</option>
      <option value="reservations">Reservations</option>
      <option value="drink_orders">Drink Orders</option>
      <option value="shift_payments">Shift Records</option>
      <option value="expenses">Expenses</option>
      <option value="shared_space_packages">Packages</option>
    </select>
  </div>

  <div id="items-list" class="space-y-4"></div>
  <p id="empty-state" class="hidden font-label-mono text-label-mono uppercase text-on-surface-variant py-12 text-center">Recycle Bin is empty.</p>
</main>

<div id="error-state" class="hidden py-24 text-center">
  <p class="text-error" id="error-text"></p>
  <a href="sign-in.html" class="font-label-mono text-label-mono text-primary uppercase underline mt-4 inline-block">Sign In</a>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/staff-auth.js"></script>
<script src="js/recycle-bin.js"></script>
<script>
  const supabaseClient = window.getSpacecoClient();
  let allItems = [];

  function el(tag, className, text) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text !== undefined) node.textContent = text;
    return node;
  }

  function renderItem(item) {
    const card = el("div", "bg-surface border border-outline-variant p-4 flex items-center justify-between gap-4");
    const left = el("div");
    left.appendChild(el("span", "font-label-mono text-[11px] uppercase text-secondary block mb-1", RECYCLE_TYPE_LABEL[item.table_name] || item.table_name));
    left.appendChild(el("h3", "font-headline-md text-primary", item.title));
    left.appendChild(el("p", "font-label-mono text-[11px] text-on-surface-variant mt-1", item.details));
    const daysAgo = daysSinceDeleted(item.deleted_at);
    const expiresIn = Math.max(0, 30 - daysAgo);
    left.appendChild(el("p", "font-label-mono text-[11px] text-on-surface-variant mt-1", `Deleted ${daysAgo === 0 ? "today" : daysAgo + " day(s) ago"} · expires in ${expiresIn} day(s)`));
    card.appendChild(left);

    const actions = el("div", "flex gap-3 shrink-0");
    const restoreBtn = el("button", "border border-outline-variant py-2 px-4 font-label-mono text-[11px] uppercase hover:border-primary", "Restore");
    const purgeBtn = el("button", "border border-error text-error py-2 px-4 font-label-mono text-[11px] uppercase hover:bg-error hover:text-white", "Delete Forever");

    restoreBtn.addEventListener("click", async () => {
      restoreBtn.disabled = true;
      purgeBtn.disabled = true;
      const result = await restoreItem(supabaseClient, item.table_name, item.row_id);
      if (result.error) {
        alert(result.error);
        restoreBtn.disabled = false;
        purgeBtn.disabled = false;
        return;
      }
      await loadItems();
    });

    purgeBtn.addEventListener("click", async () => {
      if (!confirm("Permanently delete this? This cannot be undone.")) return;
      restoreBtn.disabled = true;
      purgeBtn.disabled = true;
      const result = await purgeItem(supabaseClient, item.table_name, item.row_id);
      if (result.error) {
        alert(result.error);
        restoreBtn.disabled = false;
        purgeBtn.disabled = false;
        return;
      }
      await loadItems();
    });

    actions.appendChild(restoreBtn);
    actions.appendChild(purgeBtn);
    card.appendChild(actions);
    return card;
  }

  function renderList() {
    const filter = document.getElementById("type-filter").value;
    const list = document.getElementById("items-list");
    list.innerHTML = "";
    const filtered = filter === "all" ? allItems : allItems.filter(i => i.table_name === filter);
    if (!filtered.length) {
      document.getElementById("empty-state").classList.remove("hidden");
      return;
    }
    document.getElementById("empty-state").classList.add("hidden");
    filtered.forEach(item => list.appendChild(renderItem(item)));
  }

  async function loadItems() {
    const result = await fetchRecycleBin(supabaseClient);
    allItems = result.error ? [] : result.items;
    renderList();
  }

  document.getElementById("type-filter").addEventListener("change", renderList);

  document.getElementById("signout-btn").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "sign-in.html";
  });

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms)),
    ]);
  }

  async function startRecycleBinPage() {
    try {
      const guard = await withTimeout(requireStaffSession(supabaseClient), 8000);
      if (guard.redirect) {
        window.location.href = "sign-in.html";
        return;
      }
      document.getElementById("staff-name").textContent = guard.staff.name;
      document.getElementById("loading-state").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
      await loadItems();
    } catch (e) {
      document.getElementById("loading-state").innerHTML = "";
      const msg = document.createElement("p");
      msg.className = "mb-4";
      msg.textContent = "Taking longer than expected to load your session.";
      const retryBtn = document.createElement("button");
      retryBtn.className = "font-label-mono text-label-mono text-primary uppercase underline";
      retryBtn.textContent = "Retry";
      retryBtn.addEventListener("click", () => window.location.reload());
      document.getElementById("loading-state").appendChild(msg);
      document.getElementById("loading-state").appendChild(retryBtn);
    }
  }

  startRecycleBinPage();
</script>
</body>
</html>
