<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://mhoustvvwmwfovocwwna.supabase.co;"/>
<meta name="referrer" content="strict-origin-when-cross-origin"/>
<title>SPACECO | Top Performers</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&family=JetBrains+Mono:wght@100..900&display=swap" rel="stylesheet"/>
<script src="js/vendor/supabase-js.umd.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          background: "#fbf9f8", surface: "#fbf9f8", "surface-container": "#efeded",
          "on-surface-variant": "#444748", primary: "#000000", secondary: "#775a19",
          "secondary-container": "#fed488", "on-secondary-container": "#785a1a",
          "outline-variant": "#c4c7c7", error: "#ba1a1a",
        },
        fontFamily: { "body-lg": ["Hanken Grotesk"], "body-md": ["Hanken Grotesk"], "headline-lg": ["Hanken Grotesk"], "display-lg": ["Hanken Grotesk"], "headline-md": ["Hanken Grotesk"], "label-mono": ["JetBrains Mono"] },
        fontSize: {
          "label-mono": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "500" }],
          "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
          "headline-lg": ["30px", { lineHeight: "38px", letterSpacing: "-0.01em", fontWeight: "600" }],
          "headline-md": ["22px", { lineHeight: "30px", fontWeight: "600" }],
          "display-lg": ["36px", { lineHeight: "44px", letterSpacing: "-0.02em", fontWeight: "700" }],
        },
        spacing: { "margin-mobile": "24px", "stack-md": "24px", "stack-lg": "48px" },
        borderRadius: { DEFAULT: "0px" },
      },
    },
  };
</script>
<style>
  body { font-family: 'Hanken Grotesk', sans-serif; }
</style>
</head>
<body class="bg-background text-on-surface-variant font-body-md min-h-screen">

<header class="flex flex-wrap justify-between items-center px-margin-mobile h-16 w-full bg-surface border-b border-outline-variant sticky top-0 z-40 gap-4">
  <div class="flex items-center gap-8">
    <span class="font-headline-md text-primary tracking-tighter">SPACECO — TOP PERFORMERS</span>
    <a href="check-in.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Check-In</a>
    <a href="claims.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Claim Requests</a>
    <a href="expenses.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Expenses</a>
    <a href="shift-payments.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Shift Payments</a>
    <a href="shared-space-packages.html" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Packages</a>
    <a href="recycle-bin.html" class="text-lg text-on-surface-variant hover:text-primary" title="Recycle Bin" aria-label="Recycle Bin">🗑️</a>
  </div>
  <div class="flex items-center gap-4">
    <span id="staff-name" class="font-label-mono text-label-mono uppercase"></span>
    <button id="signout-btn" class="font-label-mono text-label-mono text-on-surface-variant uppercase hover:text-primary">Sign Out</button>
  </div>
</header>

<div id="loading-state" class="max-w-4xl mx-auto p-margin-mobile lg:p-12 animate-pulse">
  <div class="h-3 w-32 bg-surface-container mb-3"></div>
  <div class="h-9 w-72 bg-surface-container mb-10"></div>
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
    <div class="h-20 bg-surface-container"></div>
  </div>
  <div class="space-y-3">
    <div class="h-12 bg-surface-container"></div>
    <div class="h-12 bg-surface-container"></div>
    <div class="h-12 bg-surface-container"></div>
  </div>
</div>

<main class="hidden max-w-4xl mx-auto p-margin-mobile lg:p-12" id="main-content">
  <span class="font-label-mono text-label-mono uppercase text-secondary mb-2 block">Your most loyal and highest-spending clients</span>
  <h1 class="font-display-lg text-primary mb-stack-lg">Top Performers</h1>

  <div class="flex flex-wrap items-center gap-4 mb-stack-lg">
    <div class="flex border border-outline-variant">
      <button id="mode-week" class="px-4 py-2 font-label-mono text-label-mono uppercase">Week</button>
      <button id="mode-month" class="px-4 py-2 font-label-mono text-label-mono uppercase">Month</button>
    </div>
    <button id="prev-period" class="border border-outline-variant px-3 py-2 hover:border-primary">←</button>
    <span id="period-label" class="font-headline-md text-primary"></span>
    <button id="next-period" class="border border-outline-variant px-3 py-2 hover:border-primary">→</button>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left">
      <thead>
        <tr class="border-b border-outline-variant font-label-mono text-[11px] uppercase text-on-surface-variant">
          <th class="py-2 pr-4">Rank</th>
          <th class="py-2 pr-4">Client</th>
          <th class="py-2 pr-4">Phone</th>
          <th class="py-2 pr-4">Visits</th>
          <th class="py-2 pr-4">Total Spent</th>
          <th class="py-2 pr-4">Avg / Visit</th>
          <th class="py-2 pr-4">Fav Room</th>
          <th class="py-2 pr-4">Last Visit</th>
        </tr>
      </thead>
      <tbody id="ranked-tbody"></tbody>
    </table>
    <p id="empty-state" class="hidden font-label-mono text-label-mono uppercase text-on-surface-variant py-8 text-center">No check-ins in this period.</p>
  </div>
</main>

<div id="error-state" class="hidden py-24 text-center">
  <p class="text-error" id="error-text"></p>
  <a href="sign-in.html" class="font-label-mono text-label-mono text-primary uppercase underline mt-4 inline-block">Sign In</a>
</div>

<script src="js/supabase-client.js"></script>
<script src="js/staff-auth.js"></script>
<script src="js/top-performers.js"></script>
<script>
  const supabaseClient = window.getSpacecoClient();
  let mode = "week";
  let offset = 0;

  const RANK_MEDAL = { 0: "🥇", 1: "🥈", 2: "🥉" };

  function fmtMoney(n) {
    return Number(n || 0).toLocaleString() + " LE";
  }

  function setMode(newMode) {
    mode = newMode;
    offset = 0;
    document.getElementById("mode-week").className = "px-4 py-2 font-label-mono text-label-mono uppercase " + (mode === "week" ? "bg-primary text-white" : "hover:bg-surface-container");
    document.getElementById("mode-month").className = "px-4 py-2 font-label-mono text-label-mono uppercase " + (mode === "month" ? "bg-primary text-white" : "hover:bg-surface-container");
    refresh();
  }

  document.getElementById("mode-week").addEventListener("click", () => setMode("week"));
  document.getElementById("mode-month").addEventListener("click", () => setMode("month"));
  document.getElementById("prev-period").addEventListener("click", () => { offset -= 1; refresh(); });
  document.getElementById("next-period").addEventListener("click", () => { offset += 1; refresh(); });

  async function refresh() {
    const bounds = mode === "week" ? getWeekBounds(offset) : getMonthBounds(offset);
    document.getElementById("period-label").textContent = bounds.label;

    const result = await fetchTopPerformers(supabaseClient, bounds);
    const tbody = document.getElementById("ranked-tbody");
    tbody.innerHTML = "";
    if (result.error || !result.ranked.length) {
      document.getElementById("empty-state").classList.remove("hidden");
      return;
    }
    document.getElementById("empty-state").classList.add("hidden");
    result.ranked.forEach((r, idx) => {
      const tr = document.createElement("tr");
      tr.className = "border-b border-outline-variant";
      tr.innerHTML = `
        <td class="py-2 pr-4">${RANK_MEDAL[idx] || "#" + (idx + 1)}</td>
        <td class="py-2 pr-4">${r.name}${r.isMember ? "" : " (guest)"}</td>
        <td class="py-2 pr-4">${r.phone || "-"}</td>
        <td class="py-2 pr-4">${r.visits}</td>
        <td class="py-2 pr-4">${fmtMoney(r.totalSpent)}</td>
        <td class="py-2 pr-4">${fmtMoney(r.avgPerVisit)}</td>
        <td class="py-2 pr-4">${r.favRoom}</td>
        <td class="py-2 pr-4">${r.lastVisit}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  document.getElementById("signout-btn").addEventListener("click", async () => {
    await supabaseClient.auth.signOut();
    window.location.href = "sign-in.html";
  });

  function withTimeout(promise, ms) {
    return Promise.race([
      promise,
      new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms)),
    ]);
  }

  async function startTopPerformersPage() {
    try {
      const guard = await withTimeout(requireStaffSession(supabaseClient), 8000);
      if (guard.redirect) {
        window.location.href = "sign-in.html";
        return;
      }
      document.getElementById("staff-name").textContent = guard.staff.name;
      document.getElementById("loading-state").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
      setMode("week");
    } catch (e) {
      document.getElementById("loading-state").innerHTML = "";
      const msg = document.createElement("p");
      msg.className = "mb-4";
      msg.textContent = "Taking longer than expected to load your session.";
      const retryBtn = document.createElement("button");
      retryBtn.className = "font-label-mono text-label-mono text-primary uppercase underline";
      retryBtn.textContent = "Retry";
      retryBtn.addEventListener("click", () => window.location.reload());
      document.getElementById("loading-state").appendChild(msg);
      document.getElementById("loading-state").appendChild(retryBtn);
    }
  }

  startTopPerformersPage();
</script>
</body>
</html>
